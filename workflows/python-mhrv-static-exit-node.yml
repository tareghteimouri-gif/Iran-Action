name: "python-mhrv-static-exit-node"

on:
  workflow_dispatch:

jobs:
  relay:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Download cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared

      - name: Start Node
        env:
          TUNNEL_AUTH_KEY: ${{ secrets.TUNNEL_AUTH_KEY }}
        run: |
          python3 .github/script/python-exit-node.py --host 127.0.0.1 --port 8181 &
          sleep 2

      - name: Connect to Cloudflare
        env:
          CF_TUNNEL_TOKEN: ${{ secrets.CF_TUNNEL_TOKEN }}
        run: |
          ./cloudflared tunnel run --token "$CF_TUNNEL_TOKEN" > /tmp/tunnel.log 2>&1 &
          sleep 10
          echo "🌐 Tunnel established – exit.yourdomain.com is now live."

      - name: Run
        run: |
          echo "running perfectly!"
          echo "=================================================="
          while true; do
            sleep 3600
            echo "[$(date)] Still alive!"
          done
