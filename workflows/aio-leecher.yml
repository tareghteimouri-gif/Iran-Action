name: "aio-leecher"

on:
  workflow_dispatch:
    inputs:
      url:
        description: |
          One or more URLs (newlines, commas, or spaces).
          Each URL may be followed by:
            - Shortcut mode:  v <quality>  or  a <quality>
              Video: max | min | height (e.g. 480, 720, 1080, 4k)
              Audio: max | min | bitrate in kbps (e.g. 128, 192, 320)
            - Raw mode:  -- <raw yt-dlp arguments>
              Example:  https://example.com/video -- -f bestvideo+bestaudio --merge-output-format mkv
        required: true
        type: string
      bundle_all:
        description: 'Bundle all downloaded files into a single ZIP archive before splitting'
        type: boolean
        default: false
      upload_method:
        description: 'Upload destination'
        required: true
        type: choice
        options:
          - repo          # Push to repo (split 99MB)
          - release       # GitHub Release
          - drive         # Google Drive (folder: github-actions)
        default: repo

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 700
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: "Install yt-dlp, jq, ffmpeg"
        run: |
          echo "→ Installing / updating yt-dlp..."
          mkdir -p ~/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          if ! command -v yt-dlp &> /dev/null; then
            curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp \
              -o ~/.local/bin/yt-dlp
            chmod a+rx ~/.local/bin/yt-dlp
          fi
          echo "✅ yt-dlp ready."

          echo "→ Installing jq & ffmpeg..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq ffmpeg
          echo "✅ jq & ffmpeg ready."

      - name: "Parse URLs"
        id: parse
        run: |
          INPUT="${{ github.event.inputs.url }}"
          MODIFIED=$(echo "$INPUT" | tr ',' '\n')
          ENTRIES='[]'

          while IFS= read -r line; do
            line=$(echo "$line" | xargs)
            [ -z "$line" ] && continue
            tokens=($line)
            i=0
            while [ $i -lt ${#tokens[@]} ]; do
              token="${tokens[$i]}"
              if [[ "$token" =~ ^https?:// ]]; then
                link="$token"
                args=()
                raw=false
                i=$((i+1))
                while [ $i -lt ${#tokens[@]} ]; do
                  next="${tokens[$i]}"
                  [[ "$next" =~ ^https?:// ]] && break
                  args+=("$next")
                  i=$((i+1))
                done

                if [ "${args[0]}" = "--" ]; then
                  raw=true
                  args=( "${args[@]:1}" )
                  echo " ⚡ Raw mode detected — shortcut logic will be skipped"
                fi

                args_json=$(printf '%s\n' "${args[@]}" | jq -R . | jq -s .)
                entry=$(jq -n \
                  --arg link "$link" \
                  --argjson args "$args_json" \
                  --argjson raw "$raw" \
                  '{link: $link, args: $args, raw: $raw}')
                ENTRIES=$(echo "$ENTRIES" | jq ". + [$entry]")
              else
                i=$((i+1))
              fi
            done
          done <<< "$MODIFIED"

          ENTRIES_JSON=$(echo "$ENTRIES" | jq -c .)
          echo "ENTRIES_JSON=$ENTRIES_JSON" >> $GITHUB_OUTPUT
          echo "✅ Parsed $(echo "$ENTRIES" | jq length) URL(s)."

      - name: "Download (list formats, pick closest match or use raw args)"
        run: |
          set -e
          ENTRIES_JSON='${{ steps.parse.outputs.ENTRIES_JSON }}'
          OUTPUT_FOLDER="downloads"
          mkdir -p "$OUTPUT_FOLDER"

          # Cookie helpers
          COOKIE_ARGS=""
          if [ -n "$INSTAGRAM_COOKIES" ]; then
            echo "$INSTAGRAM_COOKIES" > /tmp/instagram_cookies.txt
            COOKIE_ARGS="$COOKIE_ARGS --cookies /tmp/instagram_cookies.txt"
          fi
          if [ -n "$X_COOKIES" ]; then
            echo "$X_COOKIES" > /tmp/x_cookies.txt
            COOKIE_ARGS="$COOKIE_ARGS --cookies /tmp/x_cookies.txt"
          fi
          if [ -n "$YOUTUBE_COOKIES" ]; then
            echo "$YOUTUBE_COOKIES" > /tmp/youtube_cookies.txt
            COOKIE_ARGS="$COOKIE_ARGS --cookies /tmp/youtube_cookies.txt"
          fi

          count=$(echo "$ENTRIES_JSON" | jq length)
          for ((idx=0; idx<count; idx++)); do
            entry=$(echo "$ENTRIES_JSON" | jq -c ".[$idx]")
            link=$(echo "$entry" | jq -r '.link')
            raw=$(echo "$entry" | jq -r '.raw')
            args_json=$(echo "$entry" | jq -c '.args')

            echo "========================================"
            echo " Processing $((idx+1))/$count: $link"
            echo " Raw mode: $raw"
            echo " Args: $(echo "$args_json" | jq -r '.[]')"
            echo "========================================"

            # ── RAW MODE ───────────────────────────────────
            if [ "$raw" = "true" ]; then
              echo "⚡ RAW MODE — passing arguments directly to yt-dlp"
              RAW_ARGS=$(echo "$args_json" | jq -r '. | join(" ")')
              echo "→ Executing: yt-dlp $COOKIE_ARGS $RAW_ARGS -o \"$OUTPUT_FOLDER/%(title)s.%(ext)s\" \"$link\""
              yt-dlp $COOKIE_ARGS $RAW_ARGS -o "$OUTPUT_FOLDER/%(title)s.%(ext)s" "$link" || {
                echo "❌ Raw download failed — skipping."
                continue
              }
              echo "✅ Raw download complete."
              echo ""
              continue
            fi

            # ── SHORTCUT MODE (v/a) ────────────────────────
            args_array=()
            while IFS= read -r arg; do
              args_array+=("$arg")
            done < <(echo "$args_json" | jq -r '.[]')

            type=""
            val=""
            if [ ${#args_array[@]} -ge 1 ]; then
              type="${args_array[0]}"
            fi
            if [ ${#args_array[@]} -ge 2 ]; then
              val="${args_array[1]}"
            fi
            [ -z "$type" ] && type="v"
            [ -z "$val" ]  && val="max"

            echo ""
            echo "→ Available formats (yt-dlp -F):"
            yt-dlp $COOKIE_ARGS --no-progress -F "$link" 2>&1 || true
            echo ""

            echo "→ Fetching metadata (JSON)..."
            VIDEO_JSON=$(yt-dlp $COOKIE_ARGS --no-progress -j "$link" 2>/dev/null) || {
              echo "❌ Failed to fetch metadata – skipping."
              continue
            }

            if [ "$type" = "a" ]; then
              # ── AUDIO ────────────────────────────────────
              AUDIO_FORMATS=$(echo "$VIDEO_JSON" | jq '[.formats[] | select(.vcodec == "none" and .acodec != "none")]')
              if [ "$(echo "$AUDIO_FORMATS" | jq length)" -eq 0 ]; then
                echo "❌ No audio-only formats – skipping."
                continue
              fi
              echo "→ Found $(echo "$AUDIO_FORMATS" | jq length) audio-only formats."

              case "$val" in
                max)
                  FORMAT_ID=$(echo "$AUDIO_FORMATS" | jq -r 'max_by(.abr // .tbr) | .format_id')
                  CHOSEN=$(echo "$AUDIO_FORMATS" | jq -r 'max_by(.abr // .tbr) | .abr // .tbr')
                  ;;
                min)
                  FORMAT_ID=$(echo "$AUDIO_FORMATS" | jq -r 'min_by(.abr // .tbr) | .format_id')
                  CHOSEN=$(echo "$AUDIO_FORMATS" | jq -r 'min_by(.abr // .tbr) | .abr // .tbr')
                  ;;
                *)
                  BITRATE="$val"
                  BITRATES=$(echo "$AUDIO_FORMATS" | jq '[.[].abr // .tbr | select(. != null)] | unique | sort')
                  if [ "$(echo "$BITRATES" | jq length)" -eq 0 ]; then
                    echo "❌ No valid bitrate info – skipping."
                    continue
                  fi
                  CHOSEN=$(echo "$BITRATES" | jq --argjson b "$BITRATE" \
                    'map({br:., d:(. - $b | abs)}) | sort_by(.d, .br) | first.br')
                  FORMAT_ID=$(echo "$AUDIO_FORMATS" | jq -r --argjson br "$CHOSEN" \
                    'map(select((.abr // .tbr) == $br)) | first.format_id')
                  ;;
              esac
              echo "→ Selected format: $FORMAT_ID (bitrate ~${CHOSEN} kbps)"
              yt-dlp $COOKIE_ARGS --no-progress -f "$FORMAT_ID" \
                -o "$OUTPUT_FOLDER/%(title)s-${CHOSEN}kbps.%(ext)s" "$link"
            else
              # ── VIDEO ────────────────────────────────────
              COMBINED=$(echo "$VIDEO_JSON" | jq '[.formats[] | select(.vcodec != "none" and .acodec != "none")]')
              if [ "$(echo "$COMBINED" | jq length)" -eq 0 ]; then
                echo "❌ No combined (video+audio) formats – trying bestvideo+bestaudio."
                yt-dlp $COOKIE_ARGS --no-progress -f "bestvideo+bestaudio/best" \
                  -o "$OUTPUT_FOLDER/%(title)s.%(ext)s" "$link"
                continue
              fi
              echo "→ Found $(echo "$COMBINED" | jq length) combined formats."

              NON_NULL_HEIGHTS=$(echo "$COMBINED" | jq 'map(select(.height != null))')
              HAS_HEIGHTS=$(echo "$NON_NULL_HEIGHTS" | jq length)

              case "$val" in
                max)
                  if [ "$HAS_HEIGHTS" -gt 0 ]; then
                    FORMAT_ID=$(echo "$NON_NULL_HEIGHTS" | jq -r 'max_by(.height, .fps) | .format_id')
                    CHOSEN=$(echo "$NON_NULL_HEIGHTS" | jq -r 'max_by(.height, .fps) | .height')
                  else
                    echo "⚠️ All formats have unknown resolution – picking first combined."
                    FORMAT_ID=$(echo "$COMBINED" | jq -r 'first.format_id')
                    CHOSEN="unknown"
                  fi
                  ;;
                min)
                  if [ "$HAS_HEIGHTS" -gt 0 ]; then
                    FORMAT_ID=$(echo "$NON_NULL_HEIGHTS" | jq -r 'min_by(.height, .fps) | .format_id')
                    CHOSEN=$(echo "$NON_NULL_HEIGHTS" | jq -r 'min_by(.height, .fps) | .height')
                  else
                    echo "⚠️ All formats have unknown resolution – picking first combined."
                    FORMAT_ID=$(echo "$COMBINED" | jq -r 'first.format_id')
                    CHOSEN="unknown"
                  fi
                  ;;
                *)
                  HEIGHT="$val"
                  HEIGHTS=$(echo "$NON_NULL_HEIGHTS" | jq '[.[].height] | unique | sort')
                  if [ "$(echo "$HEIGHTS" | jq length)" -eq 0 ]; then
                    echo "❌ No formats with known resolution – falling back to best."
                    yt-dlp $COOKIE_ARGS --no-progress -f "best" \
                      -o "$OUTPUT_FOLDER/%(title)s.%(ext)s" "$link"
                    continue
                  fi
                  CHOSEN=$(echo "$HEIGHTS" | jq --argjson h "$HEIGHT" \
                    'map({h:., d:(. - $h | abs)}) | sort_by(.d, .h) | first.h')
                  MATCHING=$(echo "$COMBINED" | jq --argjson h "$CHOSEN" 'map(select(.height == $h))')
                  FORMAT_ID=$(echo "$MATCHING" | jq -r 'max_by(.fps) | .format_id')
                  ;;
              esac

              echo "→ Selected format: $FORMAT_ID (height ~${CHOSEN}p)"
              if [ "$CHOSEN" = "unknown" ]; then
                yt-dlp $COOKIE_ARGS --no-progress -f "$FORMAT_ID" \
                  -o "$OUTPUT_FOLDER/%(title)s.%(ext)s" "$link"
              else
                yt-dlp $COOKIE_ARGS --no-progress -f "$FORMAT_ID" \
                  -o "$OUTPUT_FOLDER/%(title)s-${CHOSEN}p.%(ext)s" "$link"
              fi
            fi

            echo "✅ Download complete."
            echo ""
          done
        env:
          INSTAGRAM_COOKIES: ${{ secrets.INSTAGRAM_COOKIES }}
          X_COOKIES: ${{ secrets.X_COOKIES }}
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}

      - name: "Archive files (bundle & upload method aware)"
        id: archive
        run: |
          if ! ls downloads/* 1>/dev/null 2>&1; then
            echo "⚠️ No files to archive."
            exit 0
          fi

          BUNDLE_ALL="${{ inputs.bundle_all }}"
          UPLOAD_METHOD="${{ inputs.upload_method }}"
          OUTPUT_DIR="leecher"
          rm -rf "$OUTPUT_DIR"
          mkdir -p "$OUTPUT_DIR"

          if [ "$UPLOAD_METHOD" = "repo" ]; then
            METHOD="split_push"
          else
            METHOD="release"
          fi

          if [ "$BUNDLE_ALL" = "true" ]; then
            # ── Bundle mode: one ZIP containing all files ──
            BUNDLE_TMP="bundle_tmp"
            mkdir -p "$BUNDLE_TMP"
            # Copy all downloaded files into the bundle folder, handling name collisions
            find downloads -type f | while read -r f; do
              fname=$(basename "$f")
              TARGET="$BUNDLE_TMP/$fname"
              if [ -e "$TARGET" ]; then
                base="${fname%.*}"
                ext="${fname##*.}"
                if [ "$base" = "$ext" ]; then
                  base="$fname"
                  ext=""
                else
                  ext=".$ext"
                fi
                counter=1
                while [ -e "$BUNDLE_TMP/${base}_${counter}${ext}" ]; do
                  counter=$((counter + 1))
                done
                TARGET="$BUNDLE_TMP/${base}_${counter}${ext}"
              fi
              cp "$f" "$TARGET"
            done

            if [ -z "$(ls -A "$BUNDLE_TMP" 2>/dev/null)" ]; then
              echo "No files to bundle."
              rm -rf "$BUNDLE_TMP"
              exit 0
            fi

            RAND5=$(tr -dc 'a-z' </dev/urandom | head -c5)
            BUNDLE_ZIP="leech_bundle_${RAND5}.zip"
            echo "📦 Creating bundle ZIP: $BUNDLE_ZIP"

            if [ "$METHOD" = "release" ]; then
              # Unsplit first, split only if > 1950 MiB
              (cd "$BUNDLE_TMP" && zip -r "../${OUTPUT_DIR}/${BUNDLE_ZIP}" *)
              FULLZIP="${OUTPUT_DIR}/${BUNDLE_ZIP}"
              SIZE=$(stat -c%s "$FULLZIP" 2>/dev/null || echo 0)
              if [ "$SIZE" -gt 2044723200 ]; then
                echo "Bundle ZIP larger than 1950 MiB, splitting"
                rm "$FULLZIP"
                (cd "$BUNDLE_TMP" && zip -r -s 1950m "../${OUTPUT_DIR}/${BUNDLE_ZIP}" *)
              fi
            else
              # split_push: always 99 MB parts
              (cd "$BUNDLE_TMP" && zip -r -s 99m "../${OUTPUT_DIR}/${BUNDLE_ZIP}" *)
            fi
            rm -rf "$BUNDLE_TMP"
          else
            # ── Per‑file mode: one ZIP per file ──
            cd downloads
            for f in *; do
              [ -f "$f" ] || continue
              RND=$(cat /dev/urandom | tr -dc 'a-z' | head -c 5)
              echo "→ Zipping: $f"
              if [ "$METHOD" = "release" ]; then
                # Unsplit first
                zip -j "../${OUTPUT_DIR}/${f}_${RND}.zip" "$f"
                FULLZIP="${OUTPUT_DIR}/${f}_${RND}.zip"
                SIZE=$(stat -c%s "$FULLZIP" 2>/dev/null || echo 0)
                if [ "$SIZE" -gt 2044723200 ]; then
                  echo "ZIP larger than 1950 MiB, splitting"
                  rm "$FULLZIP"
                  zip -j -s 1950m "../${OUTPUT_DIR}/${f}_${RND}.zip" "$f"
                fi
              else
                zip -j -s 99m "../${OUTPUT_DIR}/${f}_${RND}.zip" "$f"
              fi
            done
            cd ..
          fi

          # Generate asset list for release/drive uploads
          ls -1 "$OUTPUT_DIR" > "${OUTPUT_DIR}_assets.txt"
          echo "Assets to upload:"
          cat "${OUTPUT_DIR}_assets.txt"

      # ────────────────────────────────────────────────────────
      # GOOGLE DRIVE UPLOAD
      # ────────────────────────────────────────────────────────
      - name: "Upload to Google Drive"
        if: inputs.upload_method == 'drive'
        env:
          CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          # 1. Obtain access token
          ACCESS_TOKEN=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d client_id="$CLIENT_ID" \
            -d client_secret="$CLIENT_SECRET" \
            -d refresh_token="$REFRESH_TOKEN" \
            -d grant_type=refresh_token | jq -r '.access_token')
          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
            echo "❌ Failed to obtain access token"
            exit 1
          fi

          # 2. Find or create 'github-actions' folder
          FOLDER_NAME="github-actions"
          QUERY="mimeType='application/vnd.google-apps.folder' and name='$FOLDER_NAME' and trashed=false"
          FOLDER_ID=$(curl -s -G \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            --data-urlencode "q=$QUERY" \
            --data-urlencode "fields=files(id)" \
            "https://www.googleapis.com/drive/v3/files" | jq -r '.files[0].id // ""')
          if [ -z "$FOLDER_ID" ]; then
            echo "→ Creating folder '$FOLDER_NAME'"
            FOLDER_ID=$(curl -s -X POST \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"name\":\"$FOLDER_NAME\", \"mimeType\":\"application/vnd.google-apps.folder\"}" \
              "https://www.googleapis.com/drive/v3/files?fields=id" | jq -r '.id')
            if [ -z "$FOLDER_ID" ] || [ "$FOLDER_ID" = "null" ]; then
              echo "❌ Failed to create folder"
              exit 1
            fi
          fi
          echo "✅ Folder ID: $FOLDER_ID"

          OUTPUT_DIR="leecher"
          for file in "$OUTPUT_DIR"/*; do
            [ -f "$file" ] || continue
            fname=$(basename "$file")
            size=$(stat -c%s "$file")
            echo "→ Uploading $fname ($size bytes)..."

            # Initiate resumable upload session
            SESSION_URI=$(curl -s -X POST \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              -H "Content-Type: application/json; charset=UTF-8" \
              -H "X-Upload-Content-Type: application/zip" \
              -d "{\"name\":\"$fname\", \"parents\":[\"$FOLDER_ID\"]}" \
              "https://www.googleapis.com/upload/drive/v3/files?uploadType=resumable" \
              -D - | tr -d '\r' | grep -i '^location:' | sed 's/^location: //i' | tr -d ' ')
            if [ -z "$SESSION_URI" ]; then
              echo "❌ Failed to initiate upload session for $fname, skipping"
              continue
            fi

            # Upload the entire file in one chunk
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              -H "Content-Length: $size" \
              -H "Content-Range: bytes 0-$((size-1))/$size" \
              --data-binary "@$file" \
              "$SESSION_URI")
            if [ "$HTTP_CODE" -eq 200 ] || [ "$HTTP_CODE" -eq 201 ]; then
              echo "✅ Uploaded $fname"
            else
              echo "❌ Upload failed with HTTP $HTTP_CODE"
            fi
          done

      # ────────────────────────────────────────────────────────
      # EXISTING UPLOAD METHODS (now skipped if Drive is chosen)
      # ────────────────────────────────────────────────────────
      - name: "Upload to repository (split_push method)"
        if: inputs.upload_method == 'repo'
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          if [ -z "$(ls -A leecher/ 2>/dev/null)" ]; then
            echo "⚠️ No files to upload."
            exit 0
          fi
          echo "→ Committing and pushing leecher/ content..."
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add leecher/*
          git commit -m "Add leech ZIPs [skip ci]" || echo "Nothing to commit"

          for i in $(seq 1 5); do
            echo "→ Push attempt $i..."
            git pull --rebase --autostash origin "$BRANCH"
            if git push origin "$BRANCH"; then
              echo "✅ Push succeeded."
              break
            fi
            sleep 3
          done

      - name: "Create Release and upload assets (release method)"
        if: inputs.upload_method == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OUTPUT_DIR="leecher"
          ASSETS_FILE="${OUTPUT_DIR}_assets.txt"

          if [ ! -s "$ASSETS_FILE" ]; then
            echo "No assets to release."
            exit 0
          fi

          RAND5=$(tr -dc 'a-z' </dev/urandom | head -c5)
          TAG="aio-leecher-${RAND5}"
          echo "Creating release tag: $TAG"

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag "$TAG" -m "AI‑O Leecher download release"
          git push origin "$TAG"

          ASSET_ARGS=""
          while IFS= read -r file; do
            ASSET_ARGS="$ASSET_ARGS ${OUTPUT_DIR}/$file"
          done < "$ASSETS_FILE"

          gh release create "$TAG" $ASSET_ARGS \
            --title "aio-leecher-${RAND5}" \
            --notes "Automated release from AI‑O Leecher workflow." \
            --target "${{ github.ref_name }}"

          echo "Release '$TAG' created with assets."

      - name: "Cleanup temporary files"
        if: always()
        run: |
          rm -rf downloads bundle_tmp /tmp/instagram_cookies.txt /tmp/x_cookies.txt /tmp/youtube_cookies.txt 2>/dev/null || true
