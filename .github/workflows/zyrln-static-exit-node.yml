name: zyrln-static-exit-node

on:
  workflow_dispatch:   # manual trigger

jobs:
  relay:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 hours, extend if private repo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build relay binary
        run: go build -o zyrln-relay .github/script/zyrln-vps-exit-node.go

      - name: Start relay
        env:
          ZYRLN_RELAY_LISTEN: 127.0.0.1:8787
          ZYRLN_RELAY_KEY: ${{ secrets.TUNNEL_AUTH_KEY }}
        run: |
          chmod +x zyrln-relay
          ./zyrln-relay &
          for i in $(seq 1 20); do
            if curl -s http://127.0.0.1:8787/healthz >/dev/null 2>&1; then
              echo "Relay is up"
              break
            fi
            sleep 0.5
          done

      - name: Install 
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared

      - name: Run
        env:
          TUNNEL_TOKEN: ${{ secrets.CF_TUNNEL_TOKEN }}
        run: |
          # This will connect the tunnel using the token. The tunnel is configured
          # in Cloudflare to point to localhost:8787. The job stays alive.
          cloudflared tunnel run --token "$TUNNEL_TOKEN"
