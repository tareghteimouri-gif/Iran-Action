name: Poo poo - Download from URLs & Save to Repo

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Space-separated list of URLs to download'
        required: true
        type: string
      mode:
        description: 'Download mode'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - zip
      split_threshold_mb:
        description: 'Split files larger than this MB (0 = never split)'
        required: false
        default: 90
        type: number
      youtube_format:
        description: 'YouTube quality (best/bestvideo+bestaudio/bestaudio/worst)'
        required: false
        default: 'best'
        type: string
      output_name:
        description: 'Custom output pattern (use {date} for date, {id} for video id, {title} for title)'
        required: false
        default: '{date}_{id}'
        type: string
      convert_format:
        description: 'Convert to format (keep = no conversion)'
        required: false
        default: 'keep'
        type: choice
        options:
          - keep
          - mp4
          - mkv
          - webm
          - mp3
          - m4a
          - wav
          - opus
      batch_mode:
        description: 'Batch processing mode'
        required: false
        default: 'sequential'
        type: choice
        options:
          - sequential
          - parallel
      parallel_jobs:
        description: 'Number of parallel downloads (1-5, only for parallel mode)'
        required: false
        default: 3
        type: number

jobs:
  poo-poo-saver:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Set up Cloudflare WARP
        uses: viperadnan-git/setup-warp@v1
        with:
          mode: client
          stack: dual
          configure_docker: true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yt-dlp and other tools
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip ffmpeg python3-pip parallel
          pip3 install yt-dlp --break-system-packages

      - name: Poo poo Downloader
        run: |
          MODE="${{ github.event.inputs.mode }}"
          URLS="${{ github.event.inputs.urls }}"
          SPLIT_THRESHOLD_MB="${{ github.event.inputs.split_threshold_mb }}"
          YT_FORMAT="${{ github.event.inputs.youtube_format }}"
          OUTPUT_PATTERN="${{ github.event.inputs.output_name }}"
          CONVERT_FORMAT="${{ github.event.inputs.convert_format }}"
          BATCH_MODE="${{ github.event.inputs.batch_mode }}"
          PARALLEL_JOBS="${{ github.event.inputs.parallel_jobs }}"
          SPLIT_THRESHOLD_BYTES=$(( SPLIT_THRESHOLD_MB * 1024 * 1024 ))

          mkdir -p downloads tmp_downloads

          # Get current date for formatting
          CURRENT_DATE=$(date +%Y%m%d_%H%M%S)

          # Create download function
          download_one() {
            URL="$1"
            DATE="$2"
            echo "Processing: $URL"

            if [[ "$URL" =~ (youtube\.com|youtu\.be) ]]; then
              echo "🎬 YouTube video detected!"
              
              # First, extract video ID and title
              echo "📝 Fetching video metadata..."
              
              # Get video ID from URL
              if [[ "$URL" =~ youtube\.com/watch\?v=([a-zA-Z0-9_-]+) ]]; then
                VIDEO_ID="${BASH_REMATCH[1]}"
              elif [[ "$URL" =~ youtu\.be/([a-zA-Z0-9_-]+) ]]; then
                VIDEO_ID="${BASH_REMATCH[1]}"
              elif [[ "$URL" =~ youtube\.com/shorts/([a-zA-Z0-9_-]+) ]]; then
                VIDEO_ID="${BASH_REMATCH[1]}"
              else
                VIDEO_ID="unknown"
              fi
              
              # Get video title using yt-dlp
              VIDEO_TITLE=$(yt-dlp --get-title --no-playlist "$URL" 2>/dev/null | sed 's/[^a-zA-Z0-9_-]/_/g' | cut -c1-50)
              
              # Build output filename based on pattern
              OUTPUT_FILENAME="$OUTPUT_PATTERN"
              OUTPUT_FILENAME="${OUTPUT_FILENAME//\{date\}/$DATE}"
              OUTPUT_FILENAME="${OUTPUT_FILENAME//\{id\}/$VIDEO_ID}"
              OUTPUT_FILENAME="${OUTPUT_FILENAME//\{title\}/$VIDEO_TITLE}"
              
              # Fallback if filename is empty
              if [ -z "$OUTPUT_FILENAME" ] || [ "$OUTPUT_FILENAME" = "$OUTPUT_PATTERN" ]; then
                OUTPUT_FILENAME="${DATE}_${VIDEO_ID}"
              fi
              
              echo "📝 Output will be: $OUTPUT_FILENAME"
              
              cd tmp_downloads

              # Build base yt-dlp command
              CMD="yt-dlp -f \"$YT_FORMAT\" --no-playlist --retries 5"

              # Add conversion options
              if [ "$CONVERT_FORMAT" != "keep" ]; then
                if [[ "$CONVERT_FORMAT" == "mp3" || "$CONVERT_FORMAT" == "m4a" || "$CONVERT_FORMAT" == "wav" || "$CONVERT_FORMAT" == "opus" ]]; then
                  CMD="$CMD --extract-audio --audio-format $CONVERT_FORMAT"
                  OUTPUT_EXT="$CONVERT_FORMAT"
                else
                  CMD="$CMD --recode-video $CONVERT_FORMAT"
                  OUTPUT_EXT="$CONVERT_FORMAT"
                fi
              else
                CMD="$CMD --merge-output-format mkv"
                OUTPUT_EXT="mkv"
              fi

              # Set output template with our custom name
              CMD="$CMD -o \"$OUTPUT_FILENAME.$OUTPUT_EXT\""

              # Execute
              if eval $CMD "$URL"; then
                echo "✅ Download successful: $OUTPUT_FILENAME.$OUTPUT_EXT"
                
                # Rename if yt-dlp added extra stuff (like .webm)
                if [ -f "$OUTPUT_FILENAME.$OUTPUT_EXT" ]; then
                  # Already correct name
                  true
                elif [ -f "$OUTPUT_FILENAME.webm" ] && [ "$OUTPUT_EXT" != "webm" ]; then
                  mv "$OUTPUT_FILENAME.webm" "$OUTPUT_FILENAME.$OUTPUT_EXT"
                elif [ -f "$OUTPUT_FILENAME.mp4" ] && [ "$OUTPUT_EXT" != "mp4" ]; then
                  mv "$OUTPUT_FILENAME.mp4" "$OUTPUT_FILENAME.$OUTPUT_EXT"
                elif [ -f "$OUTPUT_FILENAME.mkv" ] && [ "$OUTPUT_EXT" != "mkv" ]; then
                  mv "$OUTPUT_FILENAME.mkv" "$OUTPUT_FILENAME.$OUTPUT_EXT"
                fi
              else
                echo "⚠️ Standard failed, trying audio-only..."
                FALLBACK_CMD="yt-dlp -f bestaudio --extract-audio --audio-format mp3 --no-playlist --retries 5"
                FALLBACK_CMD="$FALLBACK_CMD -o \"${OUTPUT_FILENAME}.mp3\""
                eval $FALLBACK_CMD "$URL"
              fi
              cd ..
            else
              FILENAME=$(basename "$URL")
              echo "📁 Direct download: $FILENAME"
              aria2c \
                --split=2 \
                --max-connection-per-server=2 \
                --min-split-size=90M \
                --dir="tmp_downloads" \
                --out="$FILENAME" \
                "$URL"
            fi
          }

          export -f download_one
          export YT_FORMAT OUTPUT_PATTERN CONVERT_FORMAT CURRENT_DATE

          # Run downloads based on batch mode
          if [ "$BATCH_MODE" = "parallel" ]; then
            echo "⚡ Parallel mode with $PARALLEL_JOBS jobs..."
            # Export for parallel
            export -f download_one
            echo "$URLS" | tr ' ' '\n' | parallel -j "$PARALLEL_JOBS" download_one {} "$CURRENT_DATE"
          else
            echo "🐢 Sequential mode..."
            for URL in $URLS; do
              download_one "$URL" "$CURRENT_DATE"
            done
          fi

          # File processing (ZIP or Split)
          if [ "$MODE" = "zip" ]; then
            ARCHIVE_NAME="downloads/poo_poo_archive_$(date +%Y%m%d_%H%M%S).zip"
            echo "📦 Creating zip archive: $ARCHIVE_NAME"
            zip -j "$ARCHIVE_NAME" tmp_downloads/* 2>/dev/null || true
            rm -rf tmp_downloads
          else
            for FILE in tmp_downloads/*; do
              [ -f "$FILE" ] || continue
              SIZE=$(stat -c%s "$FILE" 2>/dev/null || echo "0")
              BASENAME=$(basename "$FILE")

              if [ "$SPLIT_THRESHOLD_BYTES" -gt 0 ] && [ "$SIZE" -gt "$SPLIT_THRESHOLD_BYTES" ]; then
                echo "✂️ $BASENAME is $(( SIZE / 1024 / 1024 ))MB — splitting"
                zip -0 -s "${SPLIT_THRESHOLD_MB}m" "downloads/${BASENAME}.zip" -j "$FILE"
              else
                cp "$FILE" "downloads/$BASENAME"
              fi
            done
            rm -rf tmp_downloads
          fi

      - name: Commit & Push results
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add downloads/ || true
          if git diff --staged --quiet; then
            echo "No new files to commit."
            exit 0
          fi

          git commit -m "[Poo poo] Add downloaded files [skip ci]"
          git pull --rebase origin "$BRANCH" || true
          git push origin HEAD:"$BRANCH"
          echo "🎉 Files pushed to repository!"
