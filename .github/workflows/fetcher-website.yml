name: "fetcher-website"

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "🌐 URLs to capture (one per line)"
        required: true
        type: string
      capture_mhtml:
        description: "📦 Save as MHTML"
        type: boolean
        default: true
      capture_pdf:
        description: "📄 Save as PDF"
        type: boolean
        default: true
      bundle_single_zip:
        description: "🧩 Bundle all captures into one ZIP"
        type: boolean
        default: false
      upload_method:
        description: "Upload destination"
        required: true
        type: choice
        options:
          - repo
          - release
          - drive
        default: repo

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      # ── Debug (remove after confirming) ────────
      - name: "🔎 Debug inputs"
        run: |
          echo "capture_mhtml = ${{ inputs.capture_mhtml }}"
          echo "capture_pdf  = ${{ inputs.capture_pdf }}"
          echo "bundle       = ${{ inputs.bundle_single_zip }}"
          echo "upload       = ${{ inputs.upload_method }}"
          echo "--- URLs (raw) ---"
          echo "${{ inputs.urls }}"

      # ── Validate ────────────────────────────────
      - name: "🛑 Validate inputs"
        if: ${{ !inputs.capture_mhtml && !inputs.capture_pdf }}
        run: |
          echo "❌ You must enable at least one capture method (MHTML or PDF)."
          exit 1

      # ── Python setup (MHTML) ────────────────────
      - name: "Set up Python"
        if: inputs.capture_mhtml
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: "Install Python dependencies"
        if: inputs.capture_mhtml
        run: pip install pyppeteer

      # ── Node.js setup (PDF) ─────────────────────
      - name: "Set up Node.js"
        if: inputs.capture_pdf
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: "Install Node dependencies"
        if: inputs.capture_pdf
        run: |
          npm init -y > /dev/null
          npm install playwright pdf-lib

      - name: "Install Playwright browsers"
        if: inputs.capture_pdf
        run: npx playwright install --with-deps chromium

      - name: "Install Ghostscript"
        if: inputs.capture_pdf
        run: sudo apt-get update && sudo apt-get install -y ghostscript

      # ── Parse URLs ─────────────────────────────
      - name: "Parse URLs"
        if: inputs.capture_mhtml || inputs.capture_pdf
        run: |
          echo "→ Parsing user-supplied URLs…"
          awk '{
            gsub(/^[[:space:]]+|[[:space:]]+$/, "");
            if ($0 == "") next;
            if ($0 !~ /^https?:\/\//) $0 = "https://" $0;
            print
          }' <<< "${{ inputs.urls }}" > urls.txt
          echo "URL count: $(wc -l < urls.txt)"
          echo "First URL: $(head -1 urls.txt)"

      # ── Process all URLs ────────────────────────
      - name: "Process all URLs – MHTML"
        if: inputs.capture_mhtml
        run: |
          mkdir -p website
          BUNDLE_STR="${{ inputs.bundle_single_zip && 'true' || 'false' }}"
          while IFS= read -r url; do
            echo "→ MHTML: $url"
            python .github/script/website-capture-mhtml.py --url "$url" --bundle "$BUNDLE_STR"
          done < urls.txt

      - name: "Process all URLs – PDF"
        if: inputs.capture_pdf
        run: |
          mkdir -p website
          BUNDLE_STR="${{ inputs.bundle_single_zip && 'true' || 'false' }}"
          while IFS= read -r url; do
            echo "→ PDF: $url"
            node .github/script/website-capture-pdf.js "$url" --bundle "$BUNDLE_STR"
          done < urls.txt

      # ── Archive captures ────────────────────────
      - name: "Archive captures"
        if: always() && (inputs.capture_mhtml || inputs.capture_pdf)
        run: |
          UPLOAD_METHOD="${{ inputs.upload_method }}"
          OUTPUT_DIR="website"
          TEMP_DIR="temp_captures"

          mkdir -p "$OUTPUT_DIR"
          mkdir -p "$TEMP_DIR"

          RANDSTR=$(tr -dc 'a-z0-9' < /dev/urandom | head -c 5)
          ZIP_NAME="website-capture-${RANDSTR}.zip"
          echo "Archive name: ${ZIP_NAME}"

          mv "$OUTPUT_DIR" "$TEMP_DIR"
          mkdir -p "$OUTPUT_DIR"

          if [ "$UPLOAD_METHOD" = "repo" ]; then
            (cd "$TEMP_DIR/$OUTPUT_DIR" && zip -r -s 99m "../../${OUTPUT_DIR}/${ZIP_NAME}" .)
          else
            (cd "$TEMP_DIR/$OUTPUT_DIR" && zip -r "../../${OUTPUT_DIR}/${ZIP_NAME}" .)
            FULLZIP="${OUTPUT_DIR}/${ZIP_NAME}"
            SIZE=$(stat -c%s "$FULLZIP" 2>/dev/null || echo 0)
            if [ "$SIZE" -gt 2044723200 ]; then
              echo "ZIP larger than 1950 MiB, splitting"
              rm "$FULLZIP"
              (cd "$TEMP_DIR/$OUTPUT_DIR" && zip -r -s 1950m "../../${OUTPUT_DIR}/${ZIP_NAME}" .)
            fi
          fi

          rm -rf "$TEMP_DIR"
          ls -lh "$OUTPUT_DIR"
          ls -1 "$OUTPUT_DIR" > "${OUTPUT_DIR}_assets.txt"

      # ── Google Drive upload ─────────────────────
      - name: "Upload to Google Drive"
        if: always() && inputs.upload_method == 'drive' && (inputs.capture_mhtml || inputs.capture_pdf)
        env:
          CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          ACCESS_TOKEN=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d client_id="$CLIENT_ID" \
            -d client_secret="$CLIENT_SECRET" \
            -d refresh_token="$REFRESH_TOKEN" \
            -d grant_type=refresh_token | jq -r '.access_token')
          [ -z "$ACCESS_TOKEN" ] && exit 1

          FOLDER_NAME="github-actions"
          QUERY="mimeType='application/vnd.google-apps.folder' and name='$FOLDER_NAME' and trashed=false"
          FOLDER_ID=$(curl -s -G \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            --data-urlencode "q=$QUERY" \
            --data-urlencode "fields=files(id)" \
            "https://www.googleapis.com/drive/v3/files" | jq -r '.files[0].id // ""')
          [ -z "$FOLDER_ID" ] && FOLDER_ID=$(curl -s -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"$FOLDER_NAME\",\"mimeType\":\"application/vnd.google-apps.folder\"}" \
            "https://www.googleapis.com/drive/v3/files?fields=id" | jq -r '.id')

          OUTPUT_DIR="website"
          for file in "$OUTPUT_DIR"/*; do
            [ -f "$file" ] || continue
            fname=$(basename "$file")
            size=$(stat -c%s "$file")
            echo "Uploading $fname..."

            SESSION_URI=$(curl -s -X POST \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              -H "Content-Type: application/json" \
              -H "X-Upload-Content-Type: application/zip" \
              -d "{\"name\":\"$fname\",\"parents\":[\"$FOLDER_ID\"]}" \
              "https://www.googleapis.com/upload/drive/v3/files?uploadType=resumable" \
              -D - | tr -d '\r' | grep -i '^location:' | sed 's/^location: //i' | tr -d ' ')
            [ -z "$SESSION_URI" ] && continue

            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              -H "Content-Length: $size" \
              -H "Content-Range: bytes 0-$((size-1))/$size" \
              --data-binary "@$file" "$SESSION_URI")
            if [ "$HTTP_CODE" -eq 200 ] || [ "$HTTP_CODE" -eq 201 ]; then
              echo "✅ Uploaded $fname"
            else
              echo "❌ Upload failed with $HTTP_CODE"
            fi
          done

      # ── Push to repo ───────────────────────────
      - name: "Commit and push captures"
        if: always() && inputs.upload_method == 'repo' && (inputs.capture_mhtml || inputs.capture_pdf)
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config http.postBuffer 524288000

          OUTPUT_DIR="website"
          if [ -d "$OUTPUT_DIR" ] && [ "$(ls -A "$OUTPUT_DIR" 2>/dev/null)" ]; then
            git add "$OUTPUT_DIR/"
          else
            echo "No files to commit."
            exit 0
          fi

          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git commit -m "Add website captures (ZIP) [skip ci]"

          for i in $(seq 1 5); do
            git pull --rebase --autostash origin "$BRANCH"
            if git push origin "$BRANCH"; then
              exit 0
            fi
            sleep 3
          done
          echo "Push failed after 5 attempts"
          exit 1

      # ── Create GitHub Release ───────────────────
      - name: "Create Release and upload assets"
        if: always() && inputs.upload_method == 'release' && (inputs.capture_mhtml || inputs.capture_pdf)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OUTPUT_DIR="website"
          ASSETS_FILE="${OUTPUT_DIR}_assets.txt"

          if [ ! -s "$ASSETS_FILE" ]; then
            echo "No assets to release."
            exit 0
          fi

          RAND5=$(tr -dc 'a-z' < /dev/urandom | head -c 5)
          TAG="website-capture-${RAND5}"
          echo "Tag: $TAG"

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag "$TAG" -m "Website capture release"
          git push origin "$TAG"

          ASSET_ARGS=""
          while IFS= read -r file; do
            ASSET_ARGS="$ASSET_ARGS ${OUTPUT_DIR}/$file"
          done < "$ASSETS_FILE"

          gh release create "$TAG" $ASSET_ARGS \
            --title "website-capture-${RAND5}" \
            --notes "Automated release." \
            --target "${{ github.ref_name }}"

      # ── Final cleanup ───────────────────────────
      - name: "Cleanup"
        if: always()
        run: rm -rf temp_captures website_assets.txt urls.txt 2>/dev/null || true
